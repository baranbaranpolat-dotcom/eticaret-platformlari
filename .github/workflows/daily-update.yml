name: Daily timestamp update

on:
  schedule:
    # Her gün 21:00 UTC = 00:00 Türkiye saati
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update last-update banner
        run: node scripts/daily-update.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add index.html
            git commit -m "chore: daily timestamp update [skip ci]"
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "Push rejected, rebasing (attempt $attempt)..."
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
          else
            echo "No changes to commit"
          fi
